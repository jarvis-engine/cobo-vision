<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cobo – Vision & Roadmap 2026</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reset.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/white.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --vengine: #7C3AED;
      --vengine-dark: #6D28D9;
      --vengine-light: #EDE9FE;
      --text: #0F0F1A;
      --muted: #6B7280;
    }
    .reveal { font-family: 'Inter', sans-serif; }
    .reveal h1, .reveal h2, .reveal h3 { font-family: 'Inter', sans-serif; letter-spacing: -0.03em; }
    .reveal .slides section { text-align: left; }

    /* Title slide */
    .slide-title { background: linear-gradient(135deg, #6D28D9 0%, #8B5CF6 100%); color: white !important; }
    .slide-title h1 { color: white !important; font-size: 3em; font-weight: 800; }
    .slide-title p { color: rgba(255,255,255,0.8) !important; font-size: 1.1em; }
    .slide-title .tag { display: inline-block; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 20px; padding: 4px 16px; font-size: 0.7em; margin-bottom: 20px; }

    /* Section header */
    .slide-section { background: var(--vengine); color: white !important; }
    .slide-section h2 { color: white !important; font-size: 2.5em; font-weight: 700; }
    .slide-section .num { font-size: 5em; font-weight: 800; opacity: 0.15; position: absolute; top: -20px; left: 40px; }

    /* Cards */
    .cards { display: grid; gap: 16px; }
    .cards-2 { grid-template-columns: 1fr 1fr; }
    .cards-3 { grid-template-columns: 1fr 1fr 1fr; }
    .card { background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 12px; padding: 24px; }
    .card.purple { background: var(--vengine-light); border-color: #C4B5FD; }
    .card .icon { font-size: 1.8em; margin-bottom: 10px; }
    .card h4 { font-size: 0.85em; font-weight: 600; color: var(--text); margin: 0 0 8px; }
    .card p { font-size: 0.7em; color: var(--muted); margin: 0; line-height: 1.5; }

    /* Roadmap */
    .roadmap { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
    .phase { border-radius: 12px; padding: 24px; }
    .phase-now { background: #F0FDF4; border: 2px solid #86EFAC; }
    .phase-q2 { background: var(--vengine-light); border: 2px solid #C4B5FD; }
    .phase-h2 { background: #FFF7ED; border: 2px solid #FED7AA; }
    .phase .label { font-size: 0.6em; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .phase-now .label { color: #16A34A; }
    .phase-q2 .label { color: var(--vengine); }
    .phase-h2 .label { color: #EA580C; }
    .phase h3 { font-size: 0.9em; font-weight: 700; color: var(--text); margin: 0 0 12px; }
    .phase ul { margin: 0; padding-left: 16px; }
    .phase li { font-size: 0.68em; color: #374151; margin-bottom: 6px; line-height: 1.4; }

    /* KPIs */
    .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .kpi { text-align: center; padding: 24px 16px; background: var(--vengine-light); border-radius: 12px; }
    .kpi .val { font-size: 2em; font-weight: 800; color: var(--vengine); display: block; }
    .kpi .desc { font-size: 0.65em; color: var(--muted); margin-top: 4px; }

    /* Principles */
    .principles { display: flex; flex-direction: column; gap: 12px; }
    .principle { display: flex; align-items: flex-start; gap: 16px; padding: 16px; background: #F9FAFB; border-radius: 10px; }
    .principle .num { font-size: 1.4em; font-weight: 800; color: var(--vengine); min-width: 32px; }
    .principle h4 { font-size: 0.8em; font-weight: 600; margin: 0 0 4px; }
    .principle p { font-size: 0.68em; color: var(--muted); margin: 0; }

    /* Positioning */
    .position-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .vs { padding: 20px; border-radius: 12px; }
    .vs.bad { background: #FEF2F2; border: 1px solid #FECACA; }
    .vs.good { background: #F0FDF4; border: 1px solid #BBF7D0; }
    .vs .head { font-size: 0.7em; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .vs.bad .head { color: #DC2626; }
    .vs.good .head { color: #16A34A; }
    .vs li { font-size: 0.68em; color: #374151; margin-bottom: 6px; }

    /* Slide labels */
    .slide-label { font-size: 0.55em; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--vengine); margin-bottom: 8px; display: block; }
    .reveal h2 { font-size: 1.6em; font-weight: 700; color: var(--text); margin-bottom: 24px; }

    /* Footer */
    .footer { position: absolute; bottom: 20px; right: 40px; font-size: 0.55em; color: var(--muted); }
    .footer span { color: var(--vengine); font-weight: 600; }
  </style>
  <style>
    #pw-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(135deg, #6D28D9 0%, #8B5CF6 100%);
      display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 24px;
    }
    #pw-overlay .box {
      background: white; border-radius: 16px; padding: 40px 48px; width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    #pw-overlay h2 { font-family: 'Inter',sans-serif; font-size: 1.2em; font-weight: 700; color: #0F0F1A; margin: 0 0 6px; }
    #pw-overlay p { font-family: 'Inter',sans-serif; font-size: 0.8em; color: #6B7280; margin: 0 0 20px; }
    #pw-overlay input {
      width: 100%; padding: 10px 14px; border: 1px solid #E5E7EB; border-radius: 8px;
      font-size: 0.9em; font-family: 'Inter',sans-serif; outline: none; box-sizing: border-box;
      margin-bottom: 12px; transition: border-color 0.2s;
    }
    #pw-overlay input:focus { border-color: #7C3AED; }
    #pw-overlay button {
      width: 100%; padding: 11px; background: #7C3AED; color: white; border: none;
      border-radius: 8px; font-size: 0.9em; font-weight: 600; cursor: pointer;
      font-family: 'Inter',sans-serif; transition: background 0.2s;
    }
    #pw-overlay button:hover { background: #6D28D9; }
    #pw-overlay .err { font-size: 0.75em; color: #EF4444; background: #FEF2F2; padding: 8px 12px; border-radius: 8px; border: 1px solid #FECACA; display: none; margin-top: 8px; }
    #pw-overlay .logo { font-size: 2.5em; }
    #pw-overlay .brand { color: white; font-family: 'Inter',sans-serif; font-size: 1.4em; font-weight: 700; }
  </style>

</head>
<body>
<script>
  Reveal.initialize({
    hash: true,
    controls: true,
    progress: true,
    center: false,
    transition: 'fade',
    transitionSpeed: 'fast',
    width: 1200,
    height: 700,
    margin: 0.05,
    plugins: []
  });
</script>
</body>
</html>
